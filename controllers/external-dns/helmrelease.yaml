apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 12h
  values:
    provider.name: cloudflare
    policy: sync
    domainFilters:
      - lyre.works
      - bacherik.de
      - bachflow.app
      - kunamel.app
    interval: 1h
    triggerLoopOnEvent: true
    sources:
      - ingress
      - crd
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: apiKey
