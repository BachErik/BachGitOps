apiVersion: v1
kind: ConfigMap
metadata:
  name: minecraft-config
  namespace: minecraft
  labels:
    app: minecraft
data:
  # --- required ---
  EULA: "TRUE"                 # https://aka.ms/MinecraftEULA

  # --- server flavour ---
  TYPE: "PAPER"                # VANILLA | PAPER | FABRIC | FORGE | PURPUR | ...
  VERSION: "LATEST"            # pin e.g. "1.21.4" for reproducible GitOps deploys

  # --- jvm / performance ---
  MEMORY: "4G"                 # JVM heap. Keep BELOW the container memory limit.
  USE_AIKAR_FLAGS: "true"      # sensible G1GC flags, recommended for Paper/Purpur

  # --- gameplay ---
  MOTD: "BachErik's Server"
  DIFFICULTY: "normal"
  MAX_PLAYERS: "20"
  VIEW_DISTANCE: "10"
  SIMULATION_DISTANCE: "8"
  ONLINE_MODE: "true"

  # --- ops / misc ---
  MODRINTH_PROJECTS: "kTmEpjUi,5fu9B7as"
  TZ: "Europe/Berlin"
  ENABLE_RCON: "true"          # required for graceful shutdown + the backup sidecar
  OPS: "BachErik"            # comma-separated player names
  WHITELIST: "BachErik"
  ENFORCE_WHITELIST: "true"
