apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: '@hourly'
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate:43.270.2
              args:
                - BachErik/BachGitOps
                - BachMark/BachMark
                - eron/Your-bizarre-adventure
              env:
                - name: RENOVATE_CONFIG_FILE
                  value: /config/config.js
                - name: LOG_LEVEL
                  value: debug
              envFrom:
                - secretRef:
                    name: renovate-env
              volumeMounts:
                - name: config
                  mountPath: /config
          volumes:
            - name: config
              configMap:
                name: renovate-config
            - name: work-volume
          restartPolicy: Never