apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oneuptime
  namespace: oneuptime
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: status.bacherik.de
    traefik.ingress.kubernetes.io/router.middlewares: traefik-default-headers@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: status.bacherik.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oneuptime-nginx
                port:
                  number: 80
  tls:
    - hosts:
        - status.bacherik.de
      secretName: oneuptime-tls