apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oneuptime
  namespace: oneuptime
spec:
  interval: 30m
  chart:
    spec:
      chart: oneuptime
      sourceRef:
        kind: HelmRepository
        name: oneuptime
        namespace: flux-system
  values:
    # CRITICAL: Disable OneUptime's bundled ingress/proxy
    #ingress:
    # enabled: false
    nginx:
      enabled: true
      service:
        type: ClusterIP

    # Point to external CNPG Postgres
    postgresql:
      enabled: false
    externalPostgres:
      host: postgres-platform-rw.databases.svc.cluster.local
      port: 5432
      username: oneuptime
      database: oneuptime
      existingSecret:
        name: oneuptime-db-creds
        passwordKey: password
      ssl:
        enabled: false

    # Pin to beefy node (OneUptime is resource-hungry)
    nodeSelector:
      node-role.bach-industries/heavy: "true"
