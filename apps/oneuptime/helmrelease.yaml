apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oneuptime
  namespace: oneuptime
spec:
  interval: 30m
  chart:
    spec:
      chart: oneuptime
      sourceRef:
        kind: HelmRepository
        name: oneuptime
        namespace: flux-system
  values:
    # CRITICAL: Disable OneUptime's bundled ingress/proxy
    #ingress:
     # enabled: false
    nginx:
      enabled: false

    # Point to external CNPG Postgres
    postgresql:
      enabled: false
    externalPostgres:
      host: oneuptime-db-rw.oneuptime.svc
      port: 5432
      # ... configure accordingly

    # Pin to beefy node (OneUptime is resource-hungry)
    nodeSelector:
      node-role.bach-industries/heavy: "true"