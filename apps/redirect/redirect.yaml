---
apiVersion: v1
kind: Namespace
metadata:
  name: redirect
---
# ─── Wildcard Certificates (DNS01 via Cloudflare) ─────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-bacherik-de
  namespace: redirect
spec:
  secretName: cert-bacherik-de
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.bacherik.de"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-lyre-works
  namespace: redirect
spec:
  secretName: cert-lyre-works
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "lyre.works"
    - "*.lyre.works"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-kunamel-app
  namespace: redirect
spec:
  secretName: cert-kunamel-app
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "kunamel.app"
    - "*.kunamel.app"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-bachflow-app
  namespace: redirect
spec:
  secretName: cert-bachflow-app
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "bachflow.app"
    - "*.bachflow.app"
---
# ─── Central Gateway ──────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: redirect
spec:
  gatewayClassName: traefik
  listeners:
    # bacherik.de
    - name: bacherik-de-wildcard
      hostname: "*.bacherik.de"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-bacherik-de
      allowedRoutes:
        namespaces:
          from: Same
    # lyre.works
    - name: lyre-works-apex
      hostname: "lyre.works"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-lyre-works
      allowedRoutes:
        namespaces:
          from: Same
    - name: lyre-works-wildcard
      hostname: "*.lyre.works"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-lyre-works
      allowedRoutes:
        namespaces:
          from: Same
    # kunamel.app
    - name: kunamel-app-apex
      hostname: "kunamel.app"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-kunamel-app
      allowedRoutes:
        namespaces:
          from: Same
    - name: kunamel-app-wildcard
      hostname: "*.kunamel.app"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-kunamel-app
      allowedRoutes:
        namespaces:
          from: Same
    # bachflow.app
    - name: bachflow-app-apex
      hostname: "bachflow.app"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-bachflow-app
      allowedRoutes:
        namespaces:
          from: Same
    - name: bachflow-app-wildcard
      hostname: "*.bachflow.app"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-bachflow-app
      allowedRoutes:
        namespaces:
          from: Same
---
# ─── LyreWorks ────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lyreworks-github
  namespace: redirect
spec:
  parentRefs:
    - name: main
  hostnames:
    - "lyre.works"
    - "github.lyre.works"
    - "gh.lyre.works"
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: github.com
            statusCode: 301
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /LyreWorks
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lyreworks-twitter
  namespace: redirect
spec:
  parentRefs:
    - name: main
  hostnames:
    - "twitter.lyre.works"
    - "x.lyre.works"
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: x.com
            statusCode: 301
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /LyreWorks
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lyreworks-bluesky
  namespace: redirect
spec:
  parentRefs:
    - name: main
  hostnames:
    - "bluesky.lyre.works"
    - "bsky.lyre.works"
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: bsky.app
            statusCode: 301
            path:
              type: ReplaceFullPath
              replaceFullPath: /profile/lyre.works
---
