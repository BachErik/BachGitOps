apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: upgrades
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./upgrades
  prune: true
  dependsOn:
    - name: controllers
  decryption:
    provider: sops
    secretRef:
      name: sops-age
