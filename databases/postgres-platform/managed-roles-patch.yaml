apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-platform
  namespace: databases
spec:
  managed:
    roles:
      # ── keycloak ──────────────────────────────────
      - name: keycloak
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: keycloak-db-creds
      # ── Add new app roles below ───────────────────
      # - name: myapp
      #   ensure: present
      #   login: true
      #   superuser: false
      #   passwordSecret:
      #     name: myapp-db-creds
